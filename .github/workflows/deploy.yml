# Build-only workflow for PRs. Production deploy uses deploy-azure.yml (Dockerfile.full, :full image).
name: Build (PR / optional)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: selamnew.azurecr.io
  IMAGE_NAME: document-intelligence-app
  RESOURCE_GROUP: AI-102
  CONTAINER_NAME: document-intelligence-container

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Azure credentials
      run: |
        if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
          echo "::error::AZURE_CREDENTIALS secret is empty."
          exit 1
        fi
        printf '%s' '${{ secrets.AZURE_CREDENTIALS }}' > _creds.json
        jq -e . _creds.json >/dev/null || {
          echo "::error::AZURE_CREDENTIALS must be valid JSON only. Re-run ./setup-secrets.sh"
          rm -f _creds.json
          exit 1
        }
        rm -f _creds.json

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image (Dockerfile.full for consistency)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.full
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
