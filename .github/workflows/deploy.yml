name: Deploy to Azure Container Instances

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: mikiasregistry.azurecr.io
  IMAGE_NAME: azure-practice-app
  RESOURCE_GROUP: AI-102
  CONTAINER_NAME: document-intelligence-container

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Container Instances
      run: |
        az container delete \
          --name ${{ env.CONTAINER_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --yes || true
        
        az container create \
          --name ${{ env.CONTAINER_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main \
          --dns-name-label ${{ env.CONTAINER_NAME }} \
          --ports 8000 \
          --cpu 2 \
          --memory 4 \
          --registry-username ${{ secrets.ACR_USERNAME }} \
          --registry-password ${{ secrets.ACR_PASSWORD }} \
          --environment-variables \
            AZURE_AI_LANGUAGE_ENDPOINT=${{ secrets.AZURE_AI_LANGUAGE_ENDPOINT }} \
            AZURE_AI_LANGUAGE_KEY=${{ secrets.AZURE_AI_LANGUAGE_KEY }} \
            AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }} \
            AZURE_DOCUMENT_INTELLIGENCE_KEY=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }} \
            AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
            AZURE_OPENAI_KEY=${{ secrets.AZURE_OPENAI_KEY }} \
            AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }} \
            AZURE_AI_VISION_ENDPOINT=${{ secrets.AZURE_AI_VISION_ENDPOINT }} \
            AZURE_AI_VISION_KEY=${{ secrets.AZURE_AI_VISION_KEY }} \
          --assign-identity \
          --query "{ipAddress:ipAddress.ip,fqdn:fqdn,provisioningState:provisioningState}"
