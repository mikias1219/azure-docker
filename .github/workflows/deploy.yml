name: Deploy to Azure Container Instances

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: selamnew.azurecr.io
  IMAGE_NAME: document-intelligence-app
  RESOURCE_GROUP: AI-102
  CONTAINER_NAME: document-intelligence-container

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Azure credentials
      run: |
        if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
          echo "::error::AZURE_CREDENTIALS secret is empty."
          exit 1
        fi
        printf '%s' '${{ secrets.AZURE_CREDENTIALS }}' > _creds.json
        jq -e . _creds.json >/dev/null || {
          echo "::error::AZURE_CREDENTIALS must be valid JSON only. Re-run ./setup-secrets.sh"
          rm -f _creds.json
          exit 1
        }
        rm -f _creds.json

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Container Instances
      run: |
        az container delete \
          --name ${{ env.CONTAINER_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --yes || true

        az container create \
          --name ${{ env.CONTAINER_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main \
          --os-type Linux \
          --dns-name-label ${{ env.CONTAINER_NAME }} \
          --ports 8000 \
          --cpu 2 \
          --memory 4 \
          --registry-username ${{ secrets.ACR_USERNAME }} \
          --registry-password ${{ secrets.ACR_PASSWORD }} \
          --environment-variables \
            AZURE_FORM_RECOGNIZER_ENDPOINT=${{ secrets.AZURE_FORM_RECOGNIZER_ENDPOINT }} \
            AZURE_FORM_RECOGNIZER_KEY=${{ secrets.AZURE_FORM_RECOGNIZER_KEY }} \
            AZURE_LANGUAGE_ENDPOINT=${{ secrets.AZURE_LANGUAGE_ENDPOINT }} \
            AZURE_LANGUAGE_KEY=${{ secrets.AZURE_LANGUAGE_KEY }} \
            OPENAI_API_BASE=${{ secrets.OPENAI_API_BASE }} \
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            OPENAI_DEPLOYMENT_NAME=${{ secrets.OPENAI_DEPLOYMENT_NAME }} \
            AZURE_AI_VISION_ENDPOINT=${{ secrets.AZURE_AI_VISION_ENDPOINT }} \
            AZURE_AI_VISION_KEY=${{ secrets.AZURE_AI_VISION_KEY }} \
          --query "{ipAddress:ipAddress.ip,fqdn:ipAddress.fqdn,provisioningState:provisioningState}"
