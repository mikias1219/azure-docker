# Deploy to Azure Container Instances (single job: build -> push -> deploy -> health check)
# App URL: http://<IP-from-summary>:8000 or http://<FQDN>:8000
name: Deploy Document Intelligence App to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: selamnew.azurecr.io
  IMAGE_NAME: document-intelligence-app
  RESOURCE_GROUP: AI-102
  CONTAINER_NAME: document-intelligence-container

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure credentials
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "::error::AZURE_CREDENTIALS secret is empty. Run ./setup-secrets.sh or set it in repo Settings > Secrets."
            exit 1
          fi
          printf '%s' '${{ secrets.AZURE_CREDENTIALS }}' > _creds.json
          jq -e . _creds.json >/dev/null || {
            echo "::error::AZURE_CREDENTIALS must be valid JSON only (no extra text or [INFO] etc). Re-run ./setup-secrets.sh or set the secret to exactly: {\"clientId\":\"...\",\"clientSecret\":\"...\",\"subscriptionId\":\"...\",\"tenantId\":\"...\"}"
            rm -f _creds.json
            exit 1
          }
          rm -f _creds.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=full,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.full
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Instances
        id: deploy
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: "sqlite:///./app.db"
          AZURE_FORM_RECOGNIZER_ENDPOINT: ${{ secrets.AZURE_FORM_RECOGNIZER_ENDPOINT }}
          AZURE_FORM_RECOGNIZER_KEY: ${{ secrets.AZURE_FORM_RECOGNIZER_KEY }}
          AZURE_LANGUAGE_ENDPOINT: ${{ secrets.AZURE_LANGUAGE_ENDPOINT }}
          AZURE_LANGUAGE_KEY: ${{ secrets.AZURE_LANGUAGE_KEY }}
          AZURE_QNA_PROJECT_NAME: ${{ secrets.AZURE_QNA_PROJECT_NAME }}
          AZURE_QNA_DEPLOYMENT_NAME: ${{ secrets.AZURE_QNA_DEPLOYMENT_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_DEPLOYMENT_NAME: ${{ secrets.OPENAI_DEPLOYMENT_NAME }}
          OPENAI_API_VERSION: ${{ secrets.OPENAI_API_VERSION }}
          AZURE_AI_VISION_ENDPOINT: ${{ secrets.AZURE_AI_VISION_ENDPOINT }}
          AZURE_AI_VISION_KEY: ${{ secrets.AZURE_AI_VISION_KEY }}
        run: |
          # Generate unique DNS label
          DNS_LABEL="docint-${{ github.run_number }}-$(date +%s)"
          ACI_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full"
          # Get ACR credentials
          ACR_USER=$(az acr credential show --name selamnew --resource-group AI-102 --query "username" -o tsv)
          ACR_PASS=$(az acr credential show --name selamnew --resource-group AI-102 --query "passwords[0].value" -o tsv)
          export ACR_USER ACR_PASS DNS_LABEL ACI_IMAGE
          python3 scripts/generate_aci_config.py

          # Delete existing container (if exists)
          if az container delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --yes \
            --output none 2>/dev/null; then
            echo "Waiting for name release (poll 5s x 24 = 2 min)..."
            for i in $(seq 1 24); do
              if ! az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query id -o tsv 2>/dev/null; then
                echo "Released; creating."
                break
              fi
              [ "$i" -eq 24 ] && echo "::warning::Timeout; creating anyway."
              sleep 5
            done
          else
            echo "No existing container; creating."
          fi

          # Create new container (--no-wait avoids "invalid status OK" CLI polling bug)
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --file aci/container-group-updated.json \
            --name ${{ env.CONTAINER_NAME }} \
            --location eastus \
            --os-type Linux \
            --dns-name-label $DNS_LABEL \
            --no-wait

          # Poll until container group is running (5s x 36 = 3 min max)
          echo "Waiting for container (poll 5s)..."
          for i in $(seq 1 36); do
            STATE=$(az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.instanceView.state" -o tsv 2>/dev/null || echo "NotFound")
            echo "  [$i] state: $STATE"
            if [ "$STATE" = "Running" ] || [ "$STATE" = "Succeeded" ]; then
              echo "Ready."
              break
            fi
            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Stopped" ]; then
              echo "::error::Container state: $STATE"
              CONTAINER_NAME_ACTUAL=$(az container show --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.CONTAINER_NAME }} --query "containers[0].name" -o tsv 2>/dev/null || echo "document-intelligence-app")
              az container logs --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.CONTAINER_NAME }} --container-name "$CONTAINER_NAME_ACTUAL" 2>&1 || true
              exit 1
            fi
            [ "$i" -eq 36 ] && echo "::warning::Timeout."
            sleep 5
          done

          # Get container IP and FQDN
          CONTAINER_IP=$(az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query "ipAddress.ip" -o tsv)
          
          CONTAINER_FQDN=$(az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query "ipAddress.fqdn" -o tsv)
          
          echo "Container deployed successfully!"
          echo "IP Address: $CONTAINER_IP"
          echo "FQDN: $CONTAINER_FQDN"
          echo "DNS Label: $DNS_LABEL"
          
          # Save to GitHub outputs
          echo "container_ip=$CONTAINER_IP" >> $GITHUB_OUTPUT
          echo "container_fqdn=$CONTAINER_FQDN" >> $GITHUB_OUTPUT
          echo "dns_label=$DNS_LABEL" >> $GITHUB_OUTPUT

      - name: Verify container health
        run: |
          RG="${{ env.RESOURCE_GROUP }}"
          CG="${{ env.CONTAINER_NAME }}"
          CONTAINER_IP="${{ steps.deploy.outputs.container_ip }}"
          CONTAINER_NAME_ACTUAL=$(az container show --resource-group "$RG" --name "$CG" --query "containers[0].name" -o tsv 2>/dev/null || echo "document-intelligence-app")
          echo "Health check (exec then curl, 6x5s + 4x5s)..."
          for i in $(seq 1 6); do
            if az container exec --resource-group "$RG" --name "$CG" --container-name "$CONTAINER_NAME_ACTUAL" \
              --exec-command "curl -sf --max-time 3 http://127.0.0.1:8000/health" 2>/dev/null; then
              echo "Health OK (exec, attempt $i)."
              exit 0
            fi
            sleep 5
          done
          for i in $(seq 1 4); do
            if [ -n "$CONTAINER_IP" ] && curl -sf --connect-timeout 5 --max-time 8 "http://$CONTAINER_IP:8000/health" >/dev/null; then
              echo "Health OK (curl, attempt $i)."
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Health check did not pass. Container may still be starting. Logs:"
          az container logs --resource-group "$RG" --name "$CG" --container-name "$CONTAINER_NAME_ACTUAL" 2>&1 || true

      - name: Create Static IP Reservation (for future use)
        id: static-ip
        run: |
          # Create a public IP address that can be reused
          IP_NAME="docint-static-ip"
          
          az network public-ip create \
            --name $IP_NAME \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location eastus \
            --allocation-method Static \
            --sku Standard \
            --output none || echo "Public IP might already exist"
          
          STATIC_IP=$(az network public-ip show \
            --name $IP_NAME \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "ipAddress" -o tsv)
          
          echo "Static IP reserved: $STATIC_IP"
          echo "static_ip=$STATIC_IP" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "=============================================="
          echo "  OPEN APP:  http://${{ steps.deploy.outputs.container_ip }}:8000"
          echo "  Health:    http://${{ steps.deploy.outputs.container_ip }}:8000/health"
          echo "=============================================="
          echo "FQDN: http://${{ steps.deploy.outputs.container_fqdn }}:8000"
          echo "IP:   http://${{ steps.deploy.outputs.container_ip }}:8000  (use this if FQDN is slow)"
          echo "Resource group: ${{ env.RESOURCE_GROUP }}  |  Container: ${{ env.CONTAINER_NAME }}"
