name: Deploy Document Intelligence App to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: selamnew.azurecr.io
  IMAGE_NAME: document-intelligence-app
  RESOURCE_GROUP: AI-102
  CONTAINER_NAME: document-intelligence-container

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure credentials
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "::error::AZURE_CREDENTIALS secret is empty. Run ./setup-secrets.sh or set it in repo Settings > Secrets."
            exit 1
          fi
          printf '%s' '${{ secrets.AZURE_CREDENTIALS }}' > _creds.json
          jq -e . _creds.json >/dev/null || {
            echo "::error::AZURE_CREDENTIALS must be valid JSON only (no extra text or [INFO] etc). Re-run ./setup-secrets.sh or set the secret to exactly: {\"clientId\":\"...\",\"clientSecret\":\"...\",\"subscriptionId\":\"...\",\"tenantId\":\"...\"}"
            rm -f _creds.json
            exit 1
          }
          rm -f _creds.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=full,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.full
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Azure Storage Account (if not exists)
        run: |
          # Reuse an existing storage account to avoid creating a new one every deploy
          STORAGE_ACCOUNT=$(az storage account list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'docintstorage')].name | sort(@) | [-1]" \
            -o tsv)

          if [ -z "$STORAGE_ACCOUNT" ]; then
            STORAGE_ACCOUNT="docintstorage$(date +%s)"
            az storage account create \
              --name $STORAGE_ACCOUNT \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location eastus \
              --sku Standard_LRS \
              --allow-blob-public-access false \
              --output none
          fi
          
          # Get storage account key
          STORAGE_KEY=$(az storage account keys list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --account-name $STORAGE_ACCOUNT \
            --query "[0].value" -o tsv)
          
          # Create file share
          az storage share create \
            --name app-uploads \
            --account-name $STORAGE_ACCOUNT \
            --quota 10 \
            --output none || echo "Share might already exist"
          
          echo "STORAGE_ACCOUNT=$STORAGE_ACCOUNT" >> $GITHUB_ENV
          echo "STORAGE_KEY=$STORAGE_KEY" >> $GITHUB_ENV

      - name: Deploy to Azure Container Instances
        id: deploy
        env:
          AZURE_FORM_RECOGNIZER_ENDPOINT: ${{ secrets.AZURE_FORM_RECOGNIZER_ENDPOINT }}
          AZURE_FORM_RECOGNIZER_KEY: ${{ secrets.AZURE_FORM_RECOGNIZER_KEY }}
          AZURE_LANGUAGE_ENDPOINT: ${{ secrets.AZURE_LANGUAGE_ENDPOINT }}
          AZURE_LANGUAGE_KEY: ${{ secrets.AZURE_LANGUAGE_KEY }}
          AZURE_QNA_PROJECT_NAME: ${{ secrets.AZURE_QNA_PROJECT_NAME }}
          AZURE_QNA_DEPLOYMENT_NAME: ${{ secrets.AZURE_QNA_DEPLOYMENT_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_DEPLOYMENT_NAME: ${{ secrets.OPENAI_DEPLOYMENT_NAME }}
          OPENAI_API_VERSION: ${{ secrets.OPENAI_API_VERSION }}
          AZURE_AI_VISION_ENDPOINT: ${{ secrets.AZURE_AI_VISION_ENDPOINT }}
          AZURE_AI_VISION_KEY: ${{ secrets.AZURE_AI_VISION_KEY }}
        run: |
          # Generate unique DNS label
          DNS_LABEL="docint-${{ github.run_number }}-$(date +%s)"
          ACI_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full"
          # Get ACR credentials
          ACR_USER=$(az acr credential show --name selamnew --resource-group AI-102 --query "username" -o tsv)
          ACR_PASS=$(az acr credential show --name selamnew --resource-group AI-102 --query "passwords[0].value" -o tsv)
          export ACR_USER ACR_PASS DNS_LABEL ACI_IMAGE
          
          # Update container group configuration (use env vars so Python gets real values, not literal $ACR_USER)
          python3 << 'PYEOF'
          import json
          import os
          
          with open('aci/container-group-simple-template.json', 'r') as f:
              data = json.load(f)
          
          data['properties']['imageRegistryCredentials'][0]['username'] = os.environ.get('ACR_USER', '')
          data['properties']['imageRegistryCredentials'][0]['password'] = os.environ.get('ACR_PASS', '')
          data['properties']['containers'][0]['properties']['image'] = os.environ.get('ACI_IMAGE', 'selamnew.azurecr.io/document-intelligence-app:full')
          data['properties']['ipAddress']['dnsNameLabel'] = os.environ.get('DNS_LABEL', 'docint')
          PYEOF

          # Wire environment variables through to the container for all Azure AI services in ACI
          env_vars = [
              {"name": "AZURE_FORM_RECOGNIZER_ENDPOINT", "value": os.environ.get("AZURE_FORM_RECOGNIZER_ENDPOINT", "")},
              {"name": "AZURE_FORM_RECOGNIZER_KEY", "value": os.environ.get("AZURE_FORM_RECOGNIZER_KEY", "")},
              {"name": "AZURE_LANGUAGE_ENDPOINT", "value": os.environ.get("AZURE_LANGUAGE_ENDPOINT", "")},
              {"name": "AZURE_LANGUAGE_KEY", "value": os.environ.get("AZURE_LANGUAGE_KEY", "")},
              {"name": "AZURE_QNA_PROJECT_NAME", "value": os.environ.get("AZURE_QNA_PROJECT_NAME", "LearnFAQ")},
              {"name": "AZURE_QNA_DEPLOYMENT_NAME", "value": os.environ.get("AZURE_QNA_DEPLOYMENT_NAME", "production")},
              {"name": "OPENAI_API_KEY", "value": os.environ.get("OPENAI_API_KEY", "")},
              {"name": "OPENAI_API_BASE", "value": os.environ.get("OPENAI_API_BASE", "")},
              {"name": "OPENAI_DEPLOYMENT_NAME", "value": os.environ.get("OPENAI_DEPLOYMENT_NAME", "")},
              {"name": "OPENAI_API_VERSION", "value": os.environ.get("OPENAI_API_VERSION", "2024-02-15-preview")},
              {"name": "AZURE_AI_VISION_ENDPOINT", "value": os.environ.get("AZURE_AI_VISION_ENDPOINT", "")},
              {"name": "AZURE_AI_VISION_KEY", "value": os.environ.get("AZURE_AI_VISION_KEY", "")},
          ]
          data['properties']['containers'][0]['properties']['environmentVariables'] = env_vars
          
          # Write updated config
          with open('aci/container-group-updated.json', 'w') as f:
              json.dump(data, f, indent=2)
          EOF
          
          # Delete existing container (if exists)
          if az container delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --yes \
            --output none 2>/dev/null; then
            echo "Waiting for container name to be released (polling up to 5 min)..."
            for i in $(seq 1 30); do
              if ! az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query id -o tsv 2>/dev/null; then
                echo "Container deleted; proceeding to create."
                break
              fi
              if [ "$i" -eq 30 ]; then echo "::warning::Timeout waiting for deletion; attempting create anyway."; fi
              sleep 10
            done
          else
            echo "No existing container found; proceeding to create."
          fi

          # Create new container (--no-wait avoids "invalid status OK" CLI polling bug)
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --file aci/container-group-updated.json \
            --name ${{ env.CONTAINER_NAME }} \
            --location eastus \
            --os-type Linux \
            --dns-name-label $DNS_LABEL \
            --no-wait

          # Poll until container group is running (--no-wait avoids "invalid status OK" CLI bug)
          echo "Waiting for container to be running..."
          for i in $(seq 1 60); do
            STATE=$(az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.instanceView.state" -o tsv 2>/dev/null || echo "NotFound")
            echo "  Container state: $STATE"
            if [ "$STATE" = "Running" ] || [ "$STATE" = "Succeeded" ]; then
              echo "Container is ready."
              break
            fi
            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Stopped" ]; then
              echo "::error::Container entered state: $STATE"
              az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} -o table 2>/dev/null || true
              echo "::group::Container logs (diagnostics)"
              az container logs --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null || true
              echo "::endgroup::"
              exit 1
            fi
            if [ "$i" -eq 60 ]; then
              echo "::warning::Timeout waiting for Running state; continuing to fetch outputs."
            fi
            sleep 10
          done

          # Get container IP and FQDN
          CONTAINER_IP=$(az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query "ipAddress.ip" -o tsv)
          
          CONTAINER_FQDN=$(az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query "ipAddress.fqdn" -o tsv)
          
          echo "Container deployed successfully!"
          echo "IP Address: $CONTAINER_IP"
          echo "FQDN: $CONTAINER_FQDN"
          echo "DNS Label: $DNS_LABEL"
          
          # Save to GitHub outputs
          echo "container_ip=$CONTAINER_IP" >> $GITHUB_OUTPUT
          echo "container_fqdn=$CONTAINER_FQDN" >> $GITHUB_OUTPUT
          echo "dns_label=$DNS_LABEL" >> $GITHUB_OUTPUT

      - name: Create Static IP Reservation (for future use)
        id: static-ip
        run: |
          # Create a public IP address that can be reused
          IP_NAME="docint-static-ip"
          
          az network public-ip create \
            --name $IP_NAME \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location eastus \
            --allocation-method Static \
            --sku Standard \
            --output none || echo "Public IP might already exist"
          
          STATIC_IP=$(az network public-ip show \
            --name $IP_NAME \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "ipAddress" -o tsv)
          
          echo "Static IP reserved: $STATIC_IP"
          echo "static_ip=$STATIC_IP" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo ""
          echo "📋 Deployment Details:"
          echo "  • Container Name: ${{ env.CONTAINER_NAME }}"
          echo "  • Resource Group: ${{ env.RESOURCE_GROUP }}"
          echo "  • IP Address: ${{ steps.deploy.outputs.container_ip }}"
          echo "  • FQDN: ${{ steps.deploy.outputs.container_fqdn }}"
          echo "  • DNS Label: ${{ steps.deploy.outputs.dns_label }}"
          echo "  • Static IP Reserved: ${{ steps.static-ip.outputs.static_ip }}"
          echo ""
          echo "🔗 Access your app at: http://${{ steps.deploy.outputs.container_fqdn }}"
          echo ""
          echo "📝 Notes:"
          echo "  • The app will be available within 1-2 minutes"
          echo "  • Static IP is reserved for future use"
          echo "  • All environment variables are securely configured"
