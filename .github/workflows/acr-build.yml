name: Azure ACR + ACI Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & Push App Image
        run: |
          az acr login --name selamnew
          docker build -t selamnew.azurecr.io/fastapi-sample:latest .
          docker push selamnew.azurecr.io/fastapi-sample:latest

      - name: Import Postgres to ACR
        run: |
          az acr import --name selamnew --resource-group AI-102 --source docker.io/library/postgres:15 --image postgres:15 || true

      - name: Create container group definition
        run: |
          IMAGE=selamnew.azurecr.io/fastapi-sample:latest
          sed "s|__IMAGE__|$IMAGE|g" aci/container-group.json > aci/tmp/container-group.json

      - name: Deploy to Azure Container Instances
        run: |
          az container delete --resource-group AI-102 --name fastapi-container-group --yes || true
          az container create \
            --resource-group AI-102 \
            --file aci/tmp/container-group.json \
            --name fastapi-container-group \
            --registry-login-server selamnew.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --location eastus