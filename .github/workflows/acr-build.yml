name: Build and push to ACR via Azure

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  acr-build:
    name: Build with ACR Tasks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (service principal)
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Build and push image using ACR
        run: |
          az acr build --resource-group AI-102 --registry selamnew \
            --image fastapi-sample:latest \
            --image fastapi-sample:${{ github.sha }} .

      - name: Deploy to Azure Container Instances
        env:
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
        run: |
          set -euo pipefail
          IMAGE=selamnew.azurecr.io/fastapi-sample:${{ github.sha }}
          RG=AI-102
          NAME=fastapi-sample-acicontainer

          echo "Deploying $IMAGE to ACI $NAME in $RG"

          # If container exists, delete (to ensure fresh image is used)
          if az container show --resource-group "$RG" --name "$NAME" >/dev/null 2>&1; then
            echo "Container exists; deleting $NAME"
            az container delete --resource-group "$RG" --name "$NAME" --yes
          fi

          az container create \
            --resource-group "$RG" \
            --name "$NAME" \
            --image "$IMAGE" \
            --ports 80 \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --ip-address Public \
            --registry-login-server selamnew.azurecr.io \
            --registry-username "$ACR_USER" \
            --registry-password "$ACR_PASS"

          echo "Deployment complete."
