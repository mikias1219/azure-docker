name: Azure ACR + ACI Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & Push App Image
        run: |
          az acr login --name selamnew
          docker build -t selamnew.azurecr.io/fastapi-sample:latest .
          docker push selamnew.azurecr.io/fastapi-sample:latest

      - name: Import Postgres to ACR
        run: |
          az acr update --name selamnew --admin-enabled true
          az acr import --name selamnew --resource-group AI-102 --source docker.io/library/postgres:15 --image postgres:15 || true

      - name: Create container group definition (Python)
        run: |
          IMAGE=selamnew.azurecr.io/fastapi-sample:latest
          ACR_USER=$(az acr credential show --name selamnew --query "username" -o tsv)
          ACR_PASS=$(az acr credential show --name selamnew --query "passwords[0].value" -o tsv)
          
          python3 -c "
          import json, os
          with open('aci/container-group.json', 'r') as f:
              data = json.load(f)
          
          data['properties']['imageRegistryCredentials'][0]['username'] = os.environ['ACR_USER']
          data['properties']['imageRegistryCredentials'][0]['password'] = os.environ['ACR_PASS']
          data['properties']['containers'][0]['properties']['image'] = os.environ['IMAGE']
          
          os.makedirs('aci/tmp', exist_ok=True)
          with open('aci/tmp/container-group.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
        env:
          IMAGE: selamnew.azurecr.io/fastapi-sample:latest
          ACR_USER: ${{ env.ACR_USER }}
          ACR_PASS: ${{ env.ACR_PASS }}

      - name: Deploy to Azure Container Instances
        run: |
          az container delete --resource-group AI-102 --name fastapi-container-group --yes || true
          az container wait --deleted --name fastapi-container-group --resource-group AI-102 --timeout 300 || true
          az container create \
            --resource-group AI-102 \
            --file aci/tmp/container-group.json \
            --name fastapi-container-group \
            --location eastus