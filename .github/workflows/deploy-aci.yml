name: Deploy ACI (App + Postgres)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Substitute image tag to temp container group file
        run: |
          IMAGE=selamnew.azurecr.io/fastapi-sample:latest
          mkdir -p aci/tmp
          sed "s|__IMAGE__|$IMAGE|g" aci/container-group.json > aci/tmp/container-group.json

      - name: Ensure ACI group deleted before deploy
        run: |
          az acr update --name selamnew --admin-enabled true
          az container delete --resource-group AI-102 --name fastapi-container-group --yes || true
          sleep 30
          az container wait --deleted --name fastapi-container-group --resource-group AI-102 || true

      - name: Create or update ACI container group (app + postgres)
        run: |
          az container create \
            --resource-group AI-102 \
            --file aci/tmp/container-group.json \
            --name fastapi-container-group \
            --registry-login-server selamnew.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --location eastus