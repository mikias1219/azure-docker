name: Deploy Streamlit Document Intelligence App to Azure

on:
  push:
    branches: [streamlit]
  workflow_dispatch:

env:
  REGISTRY: selamnew.azurecr.io
  IMAGE_NAME: document-intelligence-streamlit
  RESOURCE_GROUP: AI-102
  CONTAINER_NAME: document-intelligence-streamlit

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit-single
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Instances
        id: deploy
        env:
          AZURE_FORM_RECOGNIZER_ENDPOINT: ${{ secrets.AZURE_FORM_RECOGNIZER_ENDPOINT }}
          AZURE_FORM_RECOGNIZER_KEY: ${{ secrets.AZURE_FORM_RECOGNIZER_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_DEPLOYMENT_NAME: ${{ secrets.OPENAI_DEPLOYMENT_NAME }}
          OPENAI_API_VERSION: ${{ secrets.OPENAI_API_VERSION }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          # Generate unique DNS label
          DNS_LABEL="streamlit-${{ github.run_number }}-$(date +%s)"
          
          # Get ACR credentials
          ACR_USER=$(az acr credential show --name selamnew --resource-group AI-102 --query "username" -o tsv)
          ACR_PASS=$(az acr credential show --name selamnew --resource-group AI-102 --query "passwords[0].value" -o tsv)
          
          # Update container group configuration
          python3 << EOF
          import json
          import os
          
          with open('aci/container-group-streamlit-template.json', 'r') as f:
              data = json.load(f)
          
          # Replace placeholders
          data['properties']['imageRegistryCredentials'][0]['username'] = '$ACR_USER'
          data['properties']['imageRegistryCredentials'][0]['password'] = '$ACR_PASS'
          data['properties']['containers'][0]['properties']['image'] = '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'
          data['properties']['ipAddress']['dnsNameLabel'] = '$DNS_LABEL'

          # Update environment variables
          env_vars = [
              {"name": "AZURE_FORM_RECOGNIZER_ENDPOINT", "value": os.environ.get("AZURE_FORM_RECOGNIZER_ENDPOINT", "")},
              {"name": "AZURE_FORM_RECOGNIZER_KEY", "value": os.environ.get("AZURE_FORM_RECOGNIZER_KEY", "")},
              {"name": "OPENAI_API_KEY", "value": os.environ.get("OPENAI_API_KEY", "")},
              {"name": "OPENAI_API_BASE", "value": os.environ.get("OPENAI_API_BASE", "")},
              {"name": "OPENAI_DEPLOYMENT_NAME", "value": os.environ.get("OPENAI_DEPLOYMENT_NAME", "")},
              {"name": "OPENAI_API_VERSION", "value": os.environ.get("OPENAI_API_VERSION", "2024-02-15-preview")},
              {"name": "AZURE_SPEECH_KEY", "value": os.environ.get("AZURE_SPEECH_KEY", "")},
              {"name": "AZURE_SPEECH_REGION", "value": os.environ.get("AZURE_SPEECH_REGION", "eastus")},
              {"name": "API_BASE_URL", "value": "http://localhost:8000"},
              {"name": "SECRET_KEY", "value": os.environ.get("SECRET_KEY", "default-secret-key")}
          ]
          data['properties']['containers'][0]['properties']['environmentVariables'] = env_vars
          
          # Write updated config
          with open('aci/container-group-streamlit-updated.json', 'w') as f:
              json.dump(data, f, indent=2)
          EOF
          
          # Delete existing container (if exists)
          az container delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --yes \
            --output none || echo "Container doesn't exist yet"
          
          # Wait for deletion
          az container wait \
            --deleted \
            --name ${{ env.CONTAINER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --timeout 300 \
            --output none || echo "Container was already deleted"
          
          # Create new container
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --file aci/container-group-streamlit-updated.json \
            --name ${{ env.CONTAINER_NAME }} \
            --location eastus \
            --dns-name-label $DNS_LABEL
          
          # Get container IP and FQDN
          CONTAINER_IP=$(az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query "ipAddress.ip" -o tsv)
          
          CONTAINER_FQDN=$(az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query "ipAddress.fqdn" -o tsv)
          
          echo "Container deployed successfully!"
          echo "IP Address: $CONTAINER_IP"
          echo "FQDN: $CONTAINER_FQDN"
          echo "DNS Label: $DNS_LABEL"
          
          # Save to GitHub outputs
          echo "container_ip=$CONTAINER_IP" >> $GITHUB_OUTPUT
          echo "container_fqdn=$CONTAINER_FQDN" >> $GITHUB_OUTPUT
          echo "dns_label=$DNS_LABEL" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "🎉 Streamlit Document Intelligence App Deployed!"
          echo ""
          echo "📋 Deployment Details:"
          echo "  • Container Name: ${{ env.CONTAINER_NAME }}"
          echo "  • Resource Group: ${{ env.RESOURCE_GROUP }}"
          echo "  • IP Address: ${{ steps.deploy.outputs.container_ip }}"
          echo "  • FQDN: ${{ steps.deploy.outputs.container_fqdn }}"
          echo "  • DNS Label: ${{ steps.deploy.outputs.dns_label }}"
          echo ""
          echo "🔗 Access your Streamlit app at: http://${{ steps.deploy.outputs.container_fqdn }}:8501"
          echo "🔗 Backend API available at: http://${{ steps.deploy.outputs.container_fqdn }}:8000"
          echo ""
          echo "🎨 Features:"
          echo "  • Voice Recording with Azure Speech"
          echo "  • Real-time Transcription"
          echo "  • Document Management"
          echo "  • AI Analysis"
          echo "  • Sidebar Navigation"
          echo ""
          echo "📝 Notes:"
          echo "  • The app will be available within 1-2 minutes"
          echo "  • Voice recording requires HTTPS in production"
          echo "  • All environment variables are securely configured"
